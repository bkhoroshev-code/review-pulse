<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewPulse AI — Ответы на отзывы</title>
    <!-- Подключаем надежный Bootstrap для гарантированного темного дизайна -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-dark text-light min-vh-row d-flex flex-column justify-content-between" style="background-color: #0f172a !important;">

    <!-- Шапка сайта -->
    <header class="p-3 border-bottom border-secondary bg-black bg-opacity-50">
        <div class="container max-w-md d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 font-weight-bold text-info">🚀 ReviewPulse <span class="text-white">AI</span></h1>
            <span class="badge bg-info bg-opacity-10 text-info border border-info border-opacity-25">MVP Версия (РФ)</span>
        </div>
    </header>

    <!-- Основной контент -->
    <main class="flex-grow-1 py-5">
        <div class="container" style="max-w-xl: 600px; max-width: 600px;">
            <div class="card bg-secondary bg-opacity-10 border-secondary p-4 rounded-4 shadow-lg text-white" style="background-color: #1e293b !important;">
                <h2 class="h5 mb-4 text-white-50">Генератор авто-ответов для карт (Яндекс, Google, 2GIS)</h2>
                
                <div class="mb-3">
                    <label class="form-label small text-white-50">API Ключ (DeepSeek/OpenRouter):</label>
                    <input type="password" id="apiKey" placeholder="sk-or-v1-..." class="form-control bg-dark text-info border-secondary">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label small text-white-50">Название компании:</label>
                        <input type="text" id="bizName" value="Кофейня 'Бодрый Кот'" class="form-control bg-dark text-white border-secondary">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label small text-white-50">Оценка отзыва (1-5):</label>
                        <select id="rating" class="form-select bg-dark text-warning border-secondary">
                            <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                            <option value="4">⭐⭐⭐⭐ (4)</option>
                            <option value="3">⭐⭐⭐ (3)</option>
                            <option value="2">⭐⭐ (2)</option>
                            <option value="1">⭐ (1)</option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small text-white-50">Текст отзыва клиента:</label>
                    <textarea id="reviewText" rows="4" placeholder="Вставьте сюда отзыв с карт..." class="form-control bg-dark text-white border-secondary"></textarea>
                </div>

                <button onclick="generateReply()" id="btnText" class="btn btn-info w-text w-100 text-white fw-bold py-2 mt-2 shadow">
                    Сгенерировать ответ через ИИ
                </button>

                <!-- Результат работы ИИ -->
                <div id="resultBlock" class="mt-4 p-3 bg-black bg-opacity-25 border border-secondary rounded-3 d-none">
                    <h3 class="h6 text-success text-uppercase small mb-2">Идеальный ответ готов:</h3>
                    <p id="aiReply" class="p-3 bg-dark rounded border border-secondary small text-white-50 select-all" style="cursor: pointer;"></p>
                    <p class="text-muted small mb-0" style="font-size: 11px;">💡 Текст выше можно скопировать и сразу вставить на карты.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Подвал -->
    <footer class="p-3 text-center small text-muted border-top border-secondary bg-black bg-opacity-50">
        &copy; 2026 ReviewPulse AI. Работает без серверов в РФ.
    </footer>

    <!-- Логика работы сайта (JavaScript) -->
    <script>
        async function generateReply() {
            const apiKey = document.getElementById('apiKey').value;
            const bizName = document.getElementById('bizName').value;
            const rating = document.getElementById('rating').value;
            const reviewText = document.getElementById('reviewText').value;
            
            const btn = document.getElementById('btnText');
            const resultBlock = document.getElementById('resultBlock');
            const aiReply = document.getElementById('aiReply');

            if(!apiKey || !reviewText) {
                alert('Пожалуйста, введите API Ключ и текст отзыва!');
                return;
            }

            btn.innerText = 'Нейросеть думает...⏳';
            btn.disabled = true;

            const prompt = `Ты профессиональный PR-менеджер компании "${bizName}". Клиент оставил отзыв с оценкой ${rating} из 5. Текст отзыва: "${reviewText}". Напиши вежливый, уникальный и клиентоориентированный ответ. Не используй штампы. Отвечай строго на русском языке без лишнего текста, только ответ клиенту.`;

            try {
                const response = await fetch("https://openrouter.ai", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${apiKey}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "deepseek/deepseek-chat",
                        "messages": [{"role": "user", "content": prompt}]
                    })
                });

                const data = await response.json();
                const replyText = data.choices[0].message.content;

                aiReply.innerText = replyText;
                resultBlock.classList.remove('d-none');
            } catch (error) {
                alert('Произошла ошибка запроса. Проверьте правильность API ключа.');
                console.error(error);
            } finally {
                btn.innerText = 'Сгенерировать ответ через ИИ';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
